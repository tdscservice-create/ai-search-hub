<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart File Search & Editing Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        p.subtitle { color: #94a3b8; font-size: 1rem; }
        .status-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .status-card { background-color: #1e293b; padding: 10px 20px; border: 1px solid #334155; border-radius: 12px; text-align: center; }
        .status-card span { display: block; font-size: 0.8rem; color: #64748b; }
        .status-card strong { font-size: 1.2rem; color: #38bdf8; }
        .status-card.green strong { color: #4ade80; }
        .search-card { background-color: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); margin-bottom: 30px; }
        .search-form { display: flex; gap: 12px; flex-wrap: wrap; }
        input[type="text"] { flex: 1; min-width: 250px; background-color: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 14px 16px; color: #fff; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: #38bdf8; }
        select { background-color: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 0 16px; color: #fff; font-size: 0.9rem; cursor: pointer; outline: none; min-height: 50px; }
        select:focus { border-color: #38bdf8; }
        button { background-color: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 14px 28px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; }
        .result-item { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 16px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .result-title { font-size: 1.1rem; color: #38bdf8; font-weight: 600; }
        .badge { background-color: #0369a1; color: #e0f2fe; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 9999px; text-transform: uppercase; }
        .result-summary { color: #cbd5e1; font-size: 0.9rem; line-height: 1.5; margin-bottom: 15px; word-break: break-all; }
        .edit-btn { background-color: #059669; font-size: 0.85rem; padding: 8px 16px; border-radius: 6px; color: white; border: none; cursor: pointer; font-weight: 600; }
        .edit-btn:hover { background-color: #047857; }
        .placeholder-text { text-align: center; padding: 40px; color: #475569; border: 2px dashed #334155; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>✨ Smart File Search & Editing Hub</h1>
            <p class="subtitle">Find and update text, spreadsheet cells, and documents across all your folders.</p>
            <div class="status-container">
                <div class="status-card"><span>Where It Looks</span><strong>All Connected Folders</strong></div>
                <div class="status-card green"><span>Picture & Document Reader</span><strong>Ready & Working</strong></div>
            </div>
        </header>

        <div class="search-card">
            <div class="search-form">
                <input type="text" id="queryInput" placeholder="Type a file name, row word, or cell text here (Leave blank to show everything)...">
                
                <select id="filterDropdown">
                    <option value="All">All Files</option>
                    <option value="Spreadsheet">Spreadsheets Only</option>
                    <option value="PDF Document">PDFs Only</option>
                    <option value="Image Asset">Images Only</option>
                    <option value="Document">Documents Only</option>
                </select>
                
                <button onclick="executeCloudSearch()">Search Files</button>
            </div>
        </div>

        <div id="resultsGrid">
            <div class="placeholder-text">Click 'Search Files' to look through your Google Drive storage.</div>
        </div>
    </div>

    <script>
        // 🚨 CONFIGURATION HOOK
        // Replace this link with your exact Web App Link from your Google Script dashboard!
        const GOOGLE_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJfyCbb0jhPeGdORMGqNust3TLQreIZl31q13LhOxoSwEvifaqLfVcMlYYr3J5yjah3A/exec";
        async function executeCloudSearch() {
            const query = document.getElementById('queryInput').value;
            const selectedFilter = document.getElementById('filterDropdown').value;
           // const MathGrid = document.getElementById('resultsGrid');
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = `<div class='placeholder-text' style='color:#38bdf8;'>🤖 Searching folders... Reading spreadsheet data and images... Please wait...</div>`;

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_WEB_APP_URL}?search=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    resultsGrid.innerHTML = ""; 
                    let filesDisplayedCount = 0;

                    data.forEach(item => {
                        if (selectedFilter !== "All" && item.category !== selectedFilter) {
                            return; 
                        }

                        filesDisplayedCount++;

                        let typeLabel = item.category;
                        if (typeLabel === "Image Asset") typeLabel = "Scanned Image";
                        if (typeLabel === "PDF Document") typeLabel = "PDF File";
                        
                        resultsGrid.innerHTML += `
                            <div class="result-item">
                                <div class="result-header">
                                    <div class="result-title">📄 ${item.name}</div>
                                    <span class="badge">${typeLabel}</span>
                                </div>
                                <p class="result-summary" id="text-${item.id}">[Scanned Text Preview]:<br>${item.summary}</p>
                                <button class="edit-btn" onclick="modifyAsset('${item.id}', '${item.category}')">✏️ Edit File</button>
                            </div>
                        `;
                    });

                    if (filesDisplayedCount === 0) {
                        resultsGrid.innerHTML = `<div class='placeholder-text' style='color:#eab308;'>⚠️ Found files matching your text, but none match the selected filter category.</div>`;
                    }

                } else {
                    resultsGrid.innerHTML = `<div class='placeholder-text' style='color:#ef4444;'>❌ No files or matching words found inside your Google Drive.</div>`;
                }
            } catch (error) {
                resultsGrid.innerHTML = `<div class='placeholder-text' style='color:#ef4444;'>❌ Connection problem. Make sure your web link on line 54 is correct.</div>`;
            }
        }

        async function modifyAsset(id, category) {
            if (category === "Spreadsheet" || category === "PDF Document" || category === "Image Asset") {
                alert("Opening your original file in a new tab directly in Google Drive so you can edit it natively.");
                window.open(`https://google.com{id}`, '_blank');
                return;
            }

            const currentText = document.getElementById(`text-${id}`).innerText;
            const updatedText = prompt("Change the text content for this file directly:", currentText);
            
            if (updatedText === null || updatedText.trim() === "") return;

            try {
                await fetch(GOOGLE_SCRIPT_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileId: id, updatedText: updatedText })
                });
                alert("Changes sent successfully! Giving the cloud 5 seconds to update...");
                executeCloudSearch();
            } catch (err) {
                alert("Could not save the changes back to your file.");
            }
        }
    </script>
</body>
</html>
